name: Telegram Bot

on:
  schedule:
    - cron: "*/5 * * * *"   # هر 5 دقیقه
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد
        uses: actions/checkout@v3

      - name: نصب پایتون
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: نصب کتابخانه‌ها
        run: |
          pip install telethon python-telegram-bot requests

      - name: اجرای ربات
        run: python bot.py
